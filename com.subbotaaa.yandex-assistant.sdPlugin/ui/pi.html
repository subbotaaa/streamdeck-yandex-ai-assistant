<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Yandex AI Assistant — settings</title>
<style>
	:root { color-scheme: dark; }
	html, body {
		margin: 0; padding: 0;
		background: #2d2d2d; color: #d8d8d8;
		font-family: "Segoe UI", system-ui, sans-serif;
		font-size: 9pt;
		-webkit-user-select: none; user-select: none;
	}
	.wrapper { padding: 6px 10px 12px; }
	.item { display: flex; align-items: flex-start; margin: 7px 0; }
	.item > label {
		flex: 0 0 94px; text-align: right; padding: 4px 8px 0 0;
		color: #969696; white-space: pre-line;
	}
	.item > .value { flex: 1; min-width: 0; }
	input[type=text], input[type=password], select, textarea {
		width: 100%; box-sizing: border-box;
		background: #3d3d3d; color: #e6e6e6;
		border: 1px solid #232323; border-radius: 4px;
		padding: 5px 6px; font-size: 9pt; font-family: inherit;
		outline: none;
	}
	input:focus, select:focus, textarea:focus { border-color: #4e8cf0; }
	textarea { resize: vertical; min-height: 44px; -webkit-user-select: text; user-select: text; }
	input[type=range] { width: calc(100% - 44px); vertical-align: middle; }
	.range-val { display: inline-block; width: 36px; text-align: right; color: #bdbdbd; }
	.check { display: flex; align-items: center; gap: 6px; padding-top: 3px; }
	.check label { flex: none; text-align: left; padding: 0; color: #d8d8d8; }
	.hint { color: #7a7a7a; font-size: 8pt; margin: 2px 0 0; line-height: 1.35; }
	button {
		background: #3d3d3d; color: #e6e6e6; border: 1px solid #232323;
		border-radius: 4px; padding: 5px 14px; cursor: pointer; font-size: 9pt;
	}
	button:hover { background: #464646; }
	#testResult, #clearResult { margin-top: 6px; font-size: 8.5pt; line-height: 1.35; white-space: pre-wrap; -webkit-user-select: text; user-select: text; }
	#testResult.ok, #clearResult.ok { color: #7ec87e; }
	#testResult.err { color: #e08a8a; }
	#howto {
		display: none; margin: 8px 0 4px; padding: 10px 12px;
		background: #262626; border: 1px solid #3a3a3a; border-radius: 6px;
		font-size: 8.5pt; line-height: 1.5; color: #c9c9c9;
	}
	#howto.open { display: block; }
	#howto ol { margin: 4px 0 8px; padding-left: 18px; }
	#howto li { margin: 4px 0; }
	#howto code {
		background: #333; border-radius: 3px; padding: 1px 4px;
		font-family: Consolas, monospace; font-size: 8pt; color: #e0d7a8;
		-webkit-user-select: text; user-select: text;
	}
	.linkrow { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
	.linkrow button { font-size: 8.5pt; padding: 4px 10px; }
	fieldset { border: none; border-top: 1px solid #3a3a3a; margin: 12px 0 0; padding: 8px 0 0; }
	legend { color: #8a8a8a; padding: 0 6px 0 0; font-size: 8.5pt; }
</style>
</head>
<body>
<div class="wrapper">

	<div class="item">
		<label for="uiLang">Language / Язык</label>
		<div class="value">
			<select id="uiLang">
				<option value="auto">Auto</option>
				<option value="ru">Русский</option>
				<option value="en">English</option>
			</select>
		</div>
	</div>

	<div class="item">
		<label for="apiKey" data-i18n="apiKey"></label>
		<div class="value">
			<input type="password" id="apiKey" placeholder="AQVN...">
			<p class="hint" data-i18n="apiKeyHint"></p>
		</div>
	</div>

	<div class="item">
		<label for="folderId">Folder ID</label>
		<div class="value">
			<input type="text" id="folderId" placeholder="b1g...">
			<p class="hint" data-i18n="folderHint"></p>
		</div>
	</div>

	<div class="item">
		<label></label>
		<div class="value">
			<button id="btnHowto" data-i18n="howtoBtn"></button>
			<div id="howto"></div>
		</div>
	</div>

	<div class="item">
		<label for="model" data-i18n="model"></label>
		<div class="value">
			<select id="model">
				<optgroup label="YandexGPT">
					<option value="yandexgpt-lite" selected data-i18n="mLite"></option>
					<option value="yandexgpt" data-i18n="mPro"></option>
					<option value="yandexgpt-5.1" data-i18n="m51"></option>
				</optgroup>
				<optgroup label="Alice AI" data-i18n-label="gAlice">
					<option value="aliceai-llm" data-i18n="mAlice"></option>
					<option value="aliceai-llm-flash" data-i18n="mAliceFlash"></option>
				</optgroup>
				<optgroup label="Open models" data-i18n-label="gOpen">
					<option value="qwen3-235b-a22b-fp8" data-i18n="mQwen"></option>
					<option value="deepseek-v32" data-i18n="mDeepseek"></option>
					<option value="deepseek-v4-flash" data-i18n="mDeepseekFlash"></option>
					<option value="gpt-oss-120b" data-i18n="mGptOss"></option>
				</optgroup>
				<option value="custom" data-i18n="mCustom"></option>
			</select>
			<p class="hint" data-i18n="modelHint"></p>
		</div>
	</div>

	<div class="item" id="rowCustomModel" style="display:none">
		<label for="customModel" data-i18n="customModel"></label>
		<div class="value">
			<input type="text" id="customModel" placeholder="qwen3.6-35b-a3b">
			<p class="hint" data-i18n="customModelHint"></p>
		</div>
	</div>

	<div class="item">
		<label for="sysPrompt" data-i18n="sysPrompt"></label>
		<div class="value">
			<textarea id="sysPrompt"></textarea>
			<p class="hint" data-i18n="sysPromptHint"></p>
		</div>
	</div>

	<div class="item">
		<label for="sttLang" data-i18n="sttLang"></label>
		<div class="value">
			<select id="sttLang">
				<option value="ru-RU" data-i18n="langRu"></option>
				<option value="en-US" data-i18n="langEn"></option>
				<option value="auto" data-i18n="langAuto"></option>
			</select>
		</div>
	</div>

	<div class="item">
		<label for="micName" data-i18n="mic"></label>
		<div class="value">
			<select id="micName"></select>
		</div>
	</div>

	<div class="item">
		<label for="pressMode" data-i18n="pressMode"></label>
		<div class="value">
			<select id="pressMode">
				<option value="hold" selected data-i18n="pmHold"></option>
				<option value="toggle" data-i18n="pmToggle"></option>
			</select>
		</div>
	</div>

	<div class="item">
		<label></label>
		<div class="value check">
			<input type="checkbox" id="beeps" checked>
			<label for="beeps" data-i18n="beeps"></label>
		</div>
	</div>

	<fieldset>
	<legend data-i18n="secResponse"></legend>

	<div class="item">
		<label for="mode" data-i18n="mode"></label>
		<div class="value">
			<select id="mode">
				<option value="voice" data-i18n="modeVoice"></option>
				<option value="text" data-i18n="modeText"></option>
				<option value="both" data-i18n="modeBoth"></option>
			</select>
		</div>
	</div>

	<div class="item" id="rowVoice">
		<label for="voice" data-i18n="voice"></label>
		<div class="value">
			<select id="voice">
				<option value="alena" data-i18n="vAlena"></option>
				<option value="marina" data-i18n="vMarina"></option>
				<option value="jane" data-i18n="vJane"></option>
				<option value="dasha" data-i18n="vDasha"></option>
				<option value="filipp" data-i18n="vFilipp"></option>
				<option value="alexander" data-i18n="vAlexander"></option>
				<option value="ermil" data-i18n="vErmil"></option>
				<option value="anton" data-i18n="vAnton"></option>
			</select>
		</div>
	</div>

	<div class="item" id="rowSpeed">
		<label for="speed" data-i18n="speed"></label>
		<div class="value">
			<input type="range" id="speed" min="0.5" max="2" step="0.1" value="1.0">
			<span class="range-val" id="speedVal">1.0×</span>
		</div>
	</div>

	<div class="item" id="rowSpeaker">
		<label for="speakerName" data-i18n="speaker"></label>
		<div class="value">
			<select id="speakerName"></select>
		</div>
	</div>

	<div class="item" id="rowToastTime">
		<label for="toastSeconds" data-i18n="toastTime"></label>
		<div class="value">
			<select id="toastSeconds">
				<option value="3" data-i18n="t3"></option>
				<option value="5" selected data-i18n="t5"></option>
				<option value="10" data-i18n="t10"></option>
				<option value="15" data-i18n="t15"></option>
				<option value="30" data-i18n="t30"></option>
				<option value="0" data-i18n="tClick"></option>
			</select>
			<p class="hint" data-i18n="toastHint"></p>
		</div>
	</div>

	<div class="item" id="rowClip">
		<label></label>
		<div class="value check">
			<input type="checkbox" id="copyClipboard" checked>
			<label for="copyClipboard" data-i18n="clip"></label>
		</div>
	</div>
	</fieldset>

	<fieldset>
	<legend data-i18n="secJournal"></legend>

	<div class="item">
		<label></label>
		<div class="value check">
			<input type="checkbox" id="journal" checked>
			<label for="journal" data-i18n="journal"></label>
		</div>
	</div>

	<div class="item">
		<label></label>
		<div class="value">
			<button id="btnJournal" data-i18n="journalBtn"></button>
			<p class="hint" data-i18n="journalHint"></p>
		</div>
	</div>
	</fieldset>

	<fieldset>
	<legend data-i18n="secMemory"></legend>

	<div class="item">
		<label for="historySize" data-i18n="history"></label>
		<div class="value">
			<select id="historySize">
				<option value="0" data-i18n="h0"></option>
				<option value="1" data-i18n="h1"></option>
				<option value="3">3</option>
				<option value="5" selected data-i18n="h5"></option>
				<option value="10">10</option>
				<option value="20">20</option>
			</select>
			<p class="hint" data-i18n="historyHint"></p>
		</div>
	</div>

	<div class="item">
		<label></label>
		<div class="value">
			<button id="btnClearHistory" data-i18n="clearBtn"></button>
			<div id="clearResult"></div>
		</div>
	</div>
	</fieldset>

	<fieldset>
	<div class="item">
		<label></label>
		<div class="value">
			<button id="btnTest" data-i18n="testBtn"></button>
			<div id="testResult"></div>
		</div>
	</div>
	</fieldset>

	<p class="hint" style="margin-top:10px" data-i18n-html="usage"></p>
</div>

<script>
// ---------------------------------------------------------------------------
// i18n
// ---------------------------------------------------------------------------
const I18N = {

			<li>Откройте или создайте <b>каталог</b> (folder). Его идентификатор вида <code>b1g...</code> показан в списке каталогов — скопируйте его в поле <b>Folder ID</b>.</li>

			<button data-url="https://yandex.cloud/ru/docs/iam/operations/authentication/manage-api-keys#create-api-key">📄 Документация по API-ключам</button></div>`,

		sysPromptHint: "Если пишете свой промпт, добавьте: «У тебя нет доступа к интернету, отвечай из собственных знаний» — иначе модель любит отказываться от ответа.",
		sttLang: "Язык речи", langRu: "Русский", langEn: "Английский", langAuto: "Автоопределение",

		pmHold: "Удерживать кнопку (push-to-talk)", pmToggle: "Нажать — старт, нажать — стоп",

		vFilipp: "Филипп (муж.)", vAlexander: "Александр (муж.)", vErmil: "Ермил (муж.)", vAnton: "Антон (муж.)",
		speed: "Скорость", speaker: "Динамик",
		toastTime: "Показ\nуведомления",
		t3: "3 секунды", t5: "5 секунд (стандарт)", t10: "10 секунд", t15: "15 секунд", t30: "30 секунд",
		tClick: "Пока не закрою кликом",
		toastHint: "Уведомление можно закрыть раньше — кликом по нему.",
		clip: "Копировать ответ в буфер обмена",

		howtoBtn: "📖 How to get an API key and Folder ID",

			<li>Open or create a <b>folder</b>. Its ID like <code>b1g...</code> is shown in the folder list — copy it into the <b>Folder ID</b> field.</li>
			<li>Go to <b>Service accounts</b> → "Create service account". Assign the roles: <code>ai.speechkit-stt.user</code>, <code>ai.speechkit-tts.user</code>, <code>ai.languageModels.user</code>.</li>
			<li>Open the account → <b>"API keys"</b> tab → "Create API key". Copy the <b>secret</b> (a string like <code>AQVN...</code>) — it is shown only once! Paste it into the <b>API key</b> field.</li>
			<li>Click <b>"Test connection"</b> at the bottom of this panel.</li></ol>
			<div class="linkrow"><button data-url="https://console.yandex.cloud/">🌐 Open console</button>
			<button data-url="https://yandex.cloud/en/docs/iam/operations/authentication/manage-api-keys#create-api-key">📄 API key documentation</button></div>`,
		model: "Model",
		modelHint: "All models work with your Yandex Cloud API key and are billed at AI Studio rates.",
		gAlice: "Alice AI", gOpen: "Open models",
		mLite: "YandexGPT 5 Lite (fast, cheap)", mPro: "YandexGPT 5 Pro",
		m51: "YandexGPT 5.1 Pro (newest)", mAlice: "Alice AI", mAliceFlash: "Alice AI Flash (fast)",
		mQwen: "Qwen3 235B (best knowledge — recommended)", mDeepseek: "DeepSeek V3.2 (reasoning, slower)",
		mDeepseekFlash: "DeepSeek V4 Flash (reasoning)", mGptOss: "GPT-OSS 120B",
		mCustom: "Custom model…",
		customModel: "Custom model",
		customModelHint: "Model name from the Yandex Cloud console (AI Studio → Models) or a full URI gpt://folder/model/latest. /latest is appended to short names.",
		sysPrompt: "System\nprompt",
		sysPromptPh: "Empty — the built-in prompt is used: answer from own knowledge, never suggest \"searching the web\".",
		sysPromptHint: "If you write your own prompt, add: \"You have no internet access, answer from your own knowledge\" — otherwise the model tends to refuse.",
		sttLang: "Speech language", langRu: "Russian", langEn: "English", langAuto: "Auto-detect",

		vAlena: "Alena (female)", vMarina: "Marina (female)", vJane: "Jane (female)", vDasha: "Dasha (female)",
		vFilipp: "Filipp (male)", vAlexander: "Alexander (male)", vErmil: "Ermil (male)", vAnton: "Anton (male)",
		speed: "Speed", speaker: "Speaker",
		toastTime: "Notification\nduration",
		t3: "3 seconds", t5: "5 seconds (default)", t10: "10 seconds", t15: "15 seconds", t30: "30 seconds",

		secMemory: "Conversation memory",
		history: "Remember turns",
		h0: "No context memory", h1: "1 (last only)", h5: "5 (default)",
		historyHint: "How many recent question → answer pairs are sent to the model along with the new question.",
		clearBtn: "🧹 Clear conversation memory",
		cleared: "✓ Conversation memory cleared",
		testBtn: "Test connection",
		testing: "Testing…",
		usage: "Usage: <b>hold the key</b> and speak, then release (in press-to-start mode — press once, ask, press again). Up to 29 seconds per question.",
		devDefault: "System default", devMissing: " (unavailable)",
	},
};

let lang = "en";
function effectiveLang() {
	const pref = settings.uiLang || "auto";
	if (pref === "ru" || pref === "en") return pref;
	return (navigator.language || "en").toLowerCase().startsWith("ru") ? "ru" : "en";
}
function t(key) { const d = I18N[lang] || I18N.en; return d[key] !== undefined ? d[key] : (I18N.en[key] !== undefined ? I18N.en[key] : key); }
function applyI18n() {
	lang = effectiveLang();
	document.querySelectorAll("[data-i18n]").forEach((el) => { el.textContent = t(el.dataset.i18n); });
	document.querySelectorAll("[data-i18n-html]").forEach((el) => { el.innerHTML = t(el.dataset.i18nHtml); });
	document.querySelectorAll("[data-i18n-label]").forEach((el) => { el.label = t(el.dataset.i18nLabel); });
	document.getElementById("sysPrompt").placeholder = t("sysPromptPh");
	const howto = document.getElementById("howto");
	const wasOpen = howto.classList.contains("open");
	howto.innerHTML = t("howtoHtml");
	if (wasOpen) howto.classList.add("open");
	for (const btn of howto.querySelectorAll(".linkrow button")) {
		btn.addEventListener("click", () => openUrl(btn.dataset.url));
	}
	if (lastDevices) {
		fillDeviceSelect("micName", lastDevices.inputs || []);
		fillDeviceSelect("speakerName", lastDevices.outputs || []);
	}
}

// ---------------------------------------------------------------------------
// Stream Deck plumbing
// ---------------------------------------------------------------------------
let websocket = null, piUUID = null, actionUUID = null, actionContext = null;
let settings = {};
let lastDevices = null;

const FIELDS = ["apiKey", "folderId", "model", "customModel", "sysPrompt", "sttLang", "mode", "voice", "speed", "micName", "speakerName", "historySize", "pressMode", "toastSeconds", "uiLang"];
const CHECKBOXES = ["copyClipboard", "beeps", "journal"]; // default: on

function connectElgatoStreamDeckSocket(inPort, inUUID, inRegisterEvent, inInfo, inActionInfo) {
	piUUID = inUUID;
	const actionInfo = JSON.parse(inActionInfo);
	actionUUID = actionInfo.action;
	actionContext = actionInfo.context;
	settings = actionInfo.payload?.settings || {};

	websocket = new WebSocket("ws://127.0.0.1:" + inPort);
	websocket.onopen = () => {
		websocket.send(JSON.stringify({ event: inRegisterEvent, uuid: inUUID }));
		sendToPlugin({ cmd: "getDevices" });
	};
	websocket.onmessage = (evt) => {
		const msg = JSON.parse(evt.data);
		if (msg.event === "didReceiveSettings") {
			settings = msg.payload?.settings || {};
			applySettingsToForm();
		}
		if (msg.event === "sendToPropertyInspector" && msg.payload?.event === "testResult") {
			const el = document.getElementById("testResult");
			el.className = msg.payload.ok ? "ok" : "err";
			el.textContent = (msg.payload.ok ? "✓ " : "✗ ") + msg.payload.message;
			document.getElementById("btnTest").disabled = false;
		}
		if (msg.event === "sendToPropertyInspector" && msg.payload?.event === "devices") {
			lastDevices = msg.payload;
			fillDeviceSelect("micName", msg.payload.inputs || []);
			fillDeviceSelect("speakerName", msg.payload.outputs || []);
		}
		if (msg.event === "sendToPropertyInspector" && msg.payload?.event === "historyCleared") {
			const el = document.getElementById("clearResult");
			el.className = "ok";
			el.textContent = t("cleared");
			setTimeout(() => { el.textContent = ""; }, 4000);
		}
	};
	applySettingsToForm();
}

function sendToPlugin(payload) {
	if (!websocket || websocket.readyState !== 1) return;
	websocket.send(JSON.stringify({ action: actionUUID, event: "sendToPlugin", context: piUUID, payload }));
}

function openUrl(url) {
	if (!websocket || websocket.readyState !== 1) return;
	websocket.send(JSON.stringify({ event: "openUrl", payload: { url } }));
}

function saveSettings() {
	if (!websocket || websocket.readyState !== 1) return;
	websocket.send(JSON.stringify({ event: "setSettings", context: piUUID, payload: settings }));
}

function fillDeviceSelect(id, names) {
	const el = document.getElementById(id);
	const saved = settings[id] || "";
	el.innerHTML = "";
	const def = document.createElement("option");
	def.value = "";
	def.textContent = t("devDefault");
	el.appendChild(def);
	for (const name of names) {
		const opt = document.createElement("option");
		opt.value = name;
		opt.textContent = name;
		el.appendChild(opt);
	}
	if (saved && !names.includes(saved)) {
		const opt = document.createElement("option");
		opt.value = saved;
		opt.textContent = saved + t("devMissing");
		el.appendChild(opt);
	}
	el.value = saved;
}

function applySettingsToForm() {
	for (const id of FIELDS) {
		const el = document.getElementById(id);
		if (el && settings[id] !== undefined) el.value = settings[id];
	}
	for (const id of CHECKBOXES) {
		document.getElementById(id).checked = settings[id] !== false;
	}
	applyI18n();
	updateVisibility();
	updateSpeedLabel();
}

function updateVisibility() {
	const mode = document.getElementById("mode").value;
	const voiceOn = mode === "voice" || mode === "both";
	const textOn = mode === "text" || mode === "both";
	document.getElementById("rowCustomModel").style.display =
		document.getElementById("model").value === "custom" ? "" : "none";
	document.getElementById("rowVoice").style.display = voiceOn ? "" : "none";
	document.getElementById("rowSpeed").style.display = voiceOn ? "" : "none";
	document.getElementById("rowSpeaker").style.display = voiceOn ? "" : "none";
	document.getElementById("rowToastTime").style.display = textOn ? "" : "none";
	document.getElementById("rowClip").style.display = textOn ? "" : "none";
}

function updateSpeedLabel() {
	document.getElementById("speedVal").textContent =
		Number(document.getElementById("speed").value).toFixed(1) + "×";
}

for (const id of FIELDS) {
	const el = document.getElementById(id);
	el.addEventListener("input", () => {
		settings[id] = el.value;
		if (id === "mode" || id === "model") updateVisibility();
		if (id === "speed") updateSpeedLabel();
		if (id === "uiLang") applyI18n();
		saveSettings();
	});
}
for (const id of CHECKBOXES) {
	document.getElementById(id).addEventListener("change", (e) => {
		settings[id] = e.target.checked;
		saveSettings();
	});
}
document.getElementById("btnTest").addEventListener("click", () => {
	const el = document.getElementById("testResult");
	el.className = ""; el.textContent = t("testing");
	document.getElementById("btnTest").disabled = true;
	sendToPlugin({ cmd: "test" });
	setTimeout(() => { document.getElementById("btnTest").disabled = false; }, 15000);
});
document.getElementById("btnHowto").addEventListener("click", () => {
	document.getElementById("howto").classList.toggle("open");
});
document.getElementById("btnClearHistory").addEventListener("click", () => {
	sendToPlugin({ cmd: "clearHistory" });
});
document.getElementById("btnJournal").addEventListener("click", () => {
	sendToPlugin({ cmd: "openJournal" });
});

applyI18n();
</script>
